name: "💡 提交项目需求"
description: "告诉我你想要什么项目，我来帮你实现！"
title: "[需求] "
labels: ["需求", "待评估"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你提交需求！🎉
        不需要懂技术，只要说清楚你想要什么就行。

  - type: input
    id: project-name
    attributes:
      label: "项目名称"
      description: "给你的想法起个名字"
      placeholder: "比如：AI 周报生成器"
    validations:
      required: true

  - type: textarea
    id: one-liner
    attributes:
      label: "一句话描述"
      description: "用一句话说清楚它是什么、做什么"
      placeholder: "比如：输入一周的工作内容，自动生成格式化的周报"
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: "详细说明"
      description: "它应该有哪些功能？解决什么问题？谁会用？"
      placeholder: |
        - 核心功能是什么？
        - 解决了你的什么痛点？
        - 你希望它长什么样？
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: "参考"
      description: "有没有类似的产品或截图可以参考？（可选）"
      placeholder: "贴链接、截图、或者文字描述都行"
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: "项目类型"
      description: "大概属于什么类型？"
      options:
        - "🛠️ 工具类（效率工具、计算器、转换器等）"
        - "🎮 娱乐类（游戏、互动体验等）"
        - "📊 数据类（可视化、统计、分析等）"
        - "📝 内容类（编辑器、笔记、博客等）"
        - "🤖 AI 类（AI 辅助、智能生成等）"
        - "🎨 设计类（配色、图片处理等）"
        - "💬 社交类（聊天、协作等）"
        - "📚 学习类（教程、练习、测验等）"
        - "🔧 其他"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: "确认"
      options:
        - label: "我理解这个项目会开源（MIT 协议），所有人都可以使用和修改"
          required: true
