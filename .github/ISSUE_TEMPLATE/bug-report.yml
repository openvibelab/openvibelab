name: "🐛 Bug 报告"
description: "报告某个项目的问题"
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: project
    attributes:
      label: "哪个项目？"
      description: "出问题的项目名称或编号"
      placeholder: "比如：100-day-001-todo-app"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "问题描述"
      description: "发生了什么？"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "复现步骤"
      description: "怎么操作可以重现这个问题？"
      placeholder: |
        1. 打开网页
        2. 点击 xxx
        3. 出现 xxx
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: "期望行为"
      description: "你觉得正确的表现应该是什么？"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: "浏览器"
      placeholder: "Chrome 120 / Safari 17 / 微信内置浏览器"
    validations:
      required: false
